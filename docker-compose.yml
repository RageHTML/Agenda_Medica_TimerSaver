services:
  db:
    image: postgres:15-alpine
    container_name: meubanco_db
    restart: always
    env_file:
      - AgendaMedica/.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      POSTGRES_DB: ${POSTGRES_DB:-meubanco}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${POSTGRES_DB:-meubanco}"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: flask_app
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - AgendaMedica/.env
    environment:
      FLASK_APP: app.py
      # O uso de :- garante um fallback seguro caso a variável no .env venha vazia
      SECRET_KEY: ${SECRET_KEY:-chave-super-secreta-fallback-123}
      DATABASE_URL: postgresql://${POSTGRES_USER:-appuser}:${POSTGRES_PASSWORD:-apppassword}@db:5432/${POSTGRES_DB:-meubanco}
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: 5000
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "cd AgendaMedica && flask seed && python app.py"

volumes:
  postgres_data: